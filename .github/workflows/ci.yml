name: CI/CD
on:
  push:
    branches: [main]
  workflow_dispatch:
concurrency: cicd-${{ github.ref }}

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build

  cd:
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - name: azure/acr-login@v1
        uses: azure/acr-login@v1
        with:
          login-server: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}
      - name: Build and push frontend image
        run: |
          docker build -f Dockerfile.frontend \
            --build-arg NEXT_PUBLIC_API_URL=${{ secrets.BACKEND_PUBLIC_URL || '' }} \
            -t ${{ secrets.ACR_LOGIN_SERVER }}/workflow-frontend:latest .
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/workflow-frontend:latest
      - name: Get AKS credentials
        uses: azure/aks-set-context@v3
        with:
          resource-group: ${{ secrets.AKS_RESOURCE_GROUP }}
          cluster-name: ${{ secrets.AKS_CLUSTER_NAME }}
      - name: Create namespace
        run: kubectl create namespace workflow-dashboard --dry-run=client -o yaml | kubectl apply -f -
      - name: Create ACR pull secret
        run: |
          kubectl create secret docker-registry acr-pull-secret \
            --docker-server=${{ secrets.ACR_LOGIN_SERVER }} \
            --docker-username=${{ secrets.ACR_USERNAME }} \
            --docker-password=${{ secrets.ACR_PASSWORD }} \
            --namespace=workflow-dashboard
      - name: Apply frontend manifest
        run: kubectl apply -f deployment.frontend.yaml -n workflow-dashboard
      - name: Diagnose deployment
        run: |
          kubectl get pods -n workflow-dashboard -o wide
          kubectl describe deployment workflow-frontend -n workflow-dashboard
          kubectl get events -n workflow-dashboard --sort-by='.lastTimestamp' | tail -40
      - name: Wait for rollout
        run: kubectl rollout status deployment/workflow-frontend -n workflow-dashboard --timeout=600s
      - name: Show services
        run: kubectl get svc -n workflow-dashboard
      - name: Print public IP
        run: |
          kubectl get svc -n workflow-dashboard -o jsonpath='{.items[?(@.spec.type=="LoadBalancer")].status.loadBalancer.ingress[0].ip}'