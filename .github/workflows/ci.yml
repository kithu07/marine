name: CI/CD
on:
  push:
    branches: [main]
  workflow_dispatch:
concurrency: cicd-${{ github.ref }}

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build

  cd:
    needs: ci
    runs-on: ubuntu-latest
    env:
      ACR_NAME: workflowdashboardacr
      AKS_RG: workflow-dashboard-rg
      AKS_NAME: workflow-dashboard-aks
      NAMESPACE: workflow-dashboard
    steps:
      - uses: actions/checkout@v4
      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - name: az acr login
        run: |
          az acr login --name $ACR_NAME --username ${{ secrets.ACR_USERNAME }} --password ${{ secrets.ACR_PASSWORD }}
      - name: Build and push frontend image
        run: |
          docker build -f Dockerfile.frontend \
            --build-arg NEXT_PUBLIC_API_URL=${{ secrets.BACKEND_PUBLIC_URL || 'http://localhost:3000' }} \
            -t $ACR_NAME.azurecr.io/workflow-frontend:latest .
          docker push $ACR_NAME.azurecr.io/workflow-frontend:latest
      - name: Get AKS credentials
        run: az aks get-credentials --resource-group $AKS_RG --name $AKS_NAME --overwrite-existing
      - name: Attach ACR to AKS
        run: az aks update --resource-group $AKS_RG --name $AKS_NAME --attach-acr $ACR_NAME
      - name: Apply manifests
        run: kubectl apply -f k8s/ -n $NAMESPACE
      - name: Diagnose deployment
        run: |
          kubectl get pods -n $NAMESPACE -o wide
          kubectl describe deployment workflow-frontend -n $NAMESPACE
          kubectl get events -n $NAMESPACE --sort-by='.lastTimestamp' | tail -40
      - name: Wait for rollout
        run: kubectl rollout status deployment/workflow-frontend -n $NAMESPACE --timeout=600s
      - name: Show services
        run: kubectl get svc -n $NAMESPACE
      - name: Print public IP
        run: kubectl get svc -n $NAMESPACE -o jsonpath='{.items[?(@.spec.type=="LoadBalancer")].status.loadBalancer.ingress[0].ip}'